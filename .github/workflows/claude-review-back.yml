name: Claude Review Back

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to process"
        required: true
        type: string
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  review-back:
    timeout-minutes: 30
    concurrency:
      group: review-back-claude-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
      cancel-in-progress: true
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        !endsWith(github.actor, '[bot]') &&
        !contains(github.event.comment.body || github.event.review.body || '', '<!-- review-back:done -->') &&
        (
          contains(github.event.comment.body || '', '@claude') ||
          contains(github.event.review.body || '', '@claude')
        ) &&
        (
          github.event_name != 'issue_comment' ||
          github.event.issue.pull_request != null
        )
      )
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve PR number
        id: pr
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "PR number could not be resolved" >&2
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr checkout "${{ steps.pr.outputs.pr_number }}"

      - name: Run Claude Code review-back skill
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          prompt: |
            Use the `pr-review-back-workflow` skill.
            This environment is non-interactive.
            Never use `AskUserQuestion`.
            If the workflow would normally ask the user to confirm a plan, make reasonable assumptions and continue.
          claude_args: |
            --max-turns 20
            --allowedTools Bash,Read,Edit,Write
            --append-system-prompt "You are running in GitHub Actions for repository ${{ github.repository }}. Pull request #${{ steps.pr.outputs.pr_number }} is already checked out in the working directory. This environment is non-interactive, so do not wait for user answers."
