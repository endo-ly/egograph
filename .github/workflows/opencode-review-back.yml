name: OpenCode Review Back

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to process"
        required: true
        type: string
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review-back:
    timeout-minutes: 30
    concurrency:
      group: review-back-opencode-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
      cancel-in-progress: true

    # 手動トリガー or PRコメントに /oc or /opencode が含まれる場合のみ
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        !endsWith(github.actor, '[bot]') &&
        !contains(github.event.comment.body || '', '<!-- review-back:done -->') &&
        (
          contains(github.event.comment.body || '', '/oc') ||
          contains(github.event.comment.body || '', '/opencode')
        ) &&
        (
          github.event_name != 'issue_comment' ||
          github.event.issue.pull_request != null
        )
      )

    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve PR number
        id: pr
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "PR number could not be resolved" >&2
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr checkout "${{ steps.pr.outputs.pr_number }}"

      - name: Run OpenCode review-back (GLM-4.7)
        uses: anomalyco/opencode/github@latest
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        with:
          model: zai-coding-plan/glm-4.7
          share: false
          prompt: "pr-review-back-workflow Skillをロードし、指示に従って作業を進めてください。ここはGithub Action環境のため、ユーザーと対話することはできません"