name: Spotify Data Ingestion to R2 Data Lake

on:
  schedule:
    # 深夜帯を薄くしつつ、日中帯を細かく収集する（50曲以上の取りこぼしを防ぐ）
    - cron: '0 22 * * *'  # 22:00 UTC = 07:00 JST
    - cron: '0 2 * * *'   # 02:00 UTC = 11:00 JST
    - cron: '0 6 * * *'   # 06:00 UTC = 15:00 JST
    - cron: '0 10 * * *'  # 10:00 UTC = 19:00 JST
    - cron: '0 14 * * *'  # 14:00 UTC = 23:00 JST
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: |
          uv sync --all-packages

      - name: Run Spotify DuckDB ingestion pipeline
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          DUCKDB_PATH: data/analytics.duckdb
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          LOG_LEVEL: INFO
        run: |
          uv run python -m egograph.ingest.spotify.main

      - name: Compact Spotify parquet datasets
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          LOG_LEVEL: INFO
        run: |
          uv run python -m egograph.ingest.spotify.compact

      - name: Verify Compact Parquet Data Integrity (R2)
        if: success()
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          uv run python - << 'PY'
          import duckdb
          import os

          # R2設定を環境変数から直接読み取り
          endpoint_url = os.environ["R2_ENDPOINT_URL"]
          access_key_id = os.environ["R2_ACCESS_KEY_ID"]
          secret_access_key = os.environ["R2_SECRET_ACCESS_KEY"]
          bucket_name = os.environ["R2_BUCKET_NAME"]
          conn = duckdb.connect(":memory:")
          conn.execute("INSTALL httpfs; LOAD httpfs;")
          conn.execute(f"""
              CREATE SECRET (
                  TYPE S3,
                  KEY_ID '{access_key_id}',
                  SECRET '{secret_access_key}',
                  REGION 'auto',
                  ENDPOINT '{endpoint_url.replace("https://", "")}',
                  URL_STYLE 'path'
              );
          """)

          plays_url = f"s3://{bucket_name}/compacted/events/spotify/plays/**/*.parquet"
          tracks_url = f"s3://{bucket_name}/compacted/master/spotify/tracks/**/*.parquet"
          artists_url = f"s3://{bucket_name}/compacted/master/spotify/artists/**/*.parquet"
          print(f"🧐 Querying: {plays_url}")

          try:
              count = conn.execute(f"SELECT COUNT(*) FROM read_parquet('{plays_url}')").fetchone()[0]
              latest = conn.execute(f"SELECT MAX(played_at_utc) FROM read_parquet('{plays_url}')").fetchone()[0]
              track_count = conn.execute(f"SELECT COUNT(*) FROM read_parquet('{tracks_url}')").fetchone()[0]
              artist_count = conn.execute(f"SELECT COUNT(*) FROM read_parquet('{artists_url}')").fetchone()[0]

              print(f"✅ Total compacted plays in R2: {count}")
              print(f"✅ Latest compacted play in R2: {latest}")
              print(f"✅ Total compacted tracks in R2: {track_count}")
              print(f"✅ Total compacted artists in R2: {artist_count}")
          except Exception as e:
              print(f"⚠️ Verification failed or no data: {e}")
              # 初回実行時はデータがない可能性があるため、エラーにはせず警告に留める
          finally:
              conn.close()
          PY

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: |
            *.log
            logs/
          retention-days: 7
          if-no-files-found: ignore
