name: Test Browser Extension

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "egograph/browser-extension/chromium-history/**"
      - ".github/workflows/ci-browser-extension.yml"
  pull_request:
    branches: [main]
    paths:
      - "egograph/browser-extension/chromium-history/**"
      - ".github/workflows/ci-browser-extension.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: egograph/browser-extension/chromium-history

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "egograph/browser-extension/chromium-history/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Upload browser extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromium-history-extension-dist
          path: egograph/browser-extension/chromium-history/dist/
          if-no-files-found: error
          retention-days: 14
