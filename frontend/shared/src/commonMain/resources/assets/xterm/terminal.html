<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="vendor/xterm.5.5.0.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #1e1e1e;
            overflow: hidden;
            touch-action: none;
            overscroll-behavior: contain;
        }

        #xtermRender {
            position: fixed;
            inset: 0;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: #1e1e1e;
            overflow: hidden;
            touch-action: none;
        }

        #xtermRender .xterm {
            width: 100%;
            height: 100%;
        }

        #xtermRender .xterm .xterm-viewport {
            height: 100%;
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch;
        }

        /* モバイルでの不要な textarea 可視化を避ける */
        #xtermRender .xterm .xterm-helper-textarea {
            position: fixed !important;
            left: -10000px !important;
            top: -10000px !important;
            width: 1px !important;
            height: 1px !important;
            opacity: 0 !important;
            z-index: -10 !important;
            border: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
            caret-color: transparent !important;
            color: transparent !important;
            background: transparent !important;
        }
    </style>
</head>
<body>
    <div id="xtermRender"></div>
    <script src="vendor/xterm.5.5.0.js"></script>
    <script>
        (function () {
            'use strict';

            // ===== 定数 =====
            var ROOT_ID = 'xtermRender';
            var OPEN_SOCKET_READY_STATE = 1;
            var DEFAULT_CELL_WIDTH = 8.4;
            var DEFAULT_CELL_HEIGHT = 18.2;
            var MIN_COLS = 20;
            var MAX_COLS = 240;
            var MIN_ROWS = 1;
            var MAX_ROWS = 200;
            var MIN_SCROLL_DELTA = 1;
            var SCROLL_DAMPING_FACTOR = 0.5;
            var MAX_SCROLL_LINES = 6;
            var RESIZE_DEBOUNCE_MS = 200;
            var BOTTOM_FOCUS_SETTLE_FRAMES = 3;

            var TERMINAL_THEME = {
                background: '#1e1e1e',
                foreground: '#d4d4d4',
                cursor: '#d4d4d4',
                cursorAccent: '#1e1e1e',
            };

            // ===== 状態 =====
            var xtermRender = document.getElementById(ROOT_ID);
            var terminal = null;
            var websocket = null;
            var touchScrollRemainder = 0;
            var pointerScrollLastY = null;
            var pointerDragActive = false;
            var viewportListenersBound = false;
            var requestedBottomGapPx = 0;
            var appliedBottomScrollPaddingPx = 0;
            var keepBottomFocusActive = false;
            var bottomFocusAnimationFrame = 0;
            var bottomFocusPendingFrames = 0;
            var resizeTimeout = null;

            // ===== Bridge 連携 =====
            function notifyError(message) {
                if (
                    window.TerminalBridge &&
                    typeof window.TerminalBridge.onError === 'function'
                ) {
                    window.TerminalBridge.onError(message);
                }
            }

            function notifyConnectionChanged(connected) {
                if (
                    window.TerminalBridge &&
                    typeof window.TerminalBridge.onConnectionChanged === 'function'
                ) {
                    window.TerminalBridge.onConnectionChanged(connected);
                }
            }

            function notifyTerminalReady() {
                if (
                    window.TerminalBridge &&
                    typeof window.TerminalBridge.onTerminalReady === 'function'
                ) {
                    window.TerminalBridge.onTerminalReady();
                }
            }

            // ===== ユーティリティ =====
            function isSocketOpen() {
                return websocket && websocket.readyState === OPEN_SOCKET_READY_STATE;
            }

            function getTerminalRoot() {
                if (!terminal || !terminal.element) {
                    return null;
                }
                return terminal.element;
            }

            function getViewportElement() {
                var root = getTerminalRoot();
                return root ? root.querySelector('.xterm-viewport') : null;
            }

            function focusTerminal() {
                if (terminal && typeof terminal.focus === 'function') {
                    terminal.focus();
                }
            }

            function debugLog(label, payload) {
                try {
                    console.log('[TerminalDebug] ' + label + ' ' + JSON.stringify(payload || {}));
                } catch (err) {
                    console.log('[TerminalDebug] ' + label);
                }
            }

            function getReservedBottomInsetPx() {
                return requestedBottomGapPx;
            }

            function applyBottomScrollPadding() {
                appliedBottomScrollPaddingPx = 0;
                return 0;
            }

            function scrollViewportToBottom() {
                var viewport = getViewportElement();
                if (!viewport) {
                    return;
                }
                viewport.scrollTop = Math.max(0, viewport.scrollHeight - viewport.clientHeight);
            }

            function applyVisualBottomOffset() {
                return 0;
            }

            function alignTerminalBottom() {
                if (!terminal) {
                    return;
                }
                applyBottomScrollPadding();
                if (typeof terminal.scrollToBottom === 'function') {
                    terminal.scrollToBottom();
                }
                scrollViewportToBottom();
                var visualBottomOffsetPx = applyVisualBottomOffset();
                debugLog('alignTerminalBottom', {
                    requestedBottomGapPx: requestedBottomGapPx,
                    appliedBottomScrollPaddingPx: appliedBottomScrollPaddingPx,
                    visualBottomOffsetPx: visualBottomOffsetPx,
                    viewport: (function () {
                        var viewport = getViewportElement();
                        return viewport ? {
                            clientHeight: viewport.clientHeight,
                            scrollHeight: viewport.scrollHeight,
                            scrollTop: viewport.scrollTop,
                        } : null;
                    })(),
                    buffer: terminal && terminal.buffer && terminal.buffer.active ? {
                        cursorY: terminal.buffer.active.cursorY,
                        baseY: terminal.buffer.active.baseY,
                        viewportY: terminal.buffer.active.viewportY,
                        length: terminal.buffer.active.length,
                    } : null,
                });
            }

            function cancelScheduledBottomFocus() {
                if (bottomFocusAnimationFrame) {
                    window.cancelAnimationFrame(bottomFocusAnimationFrame);
                    bottomFocusAnimationFrame = 0;
                }
                bottomFocusPendingFrames = 0;
            }

            function scheduleBottomFocus(frameCount) {
                if (!keepBottomFocusActive) {
                    cancelScheduledBottomFocus();
                    return;
                }

                bottomFocusPendingFrames = Math.max(bottomFocusPendingFrames, frameCount || 1);
                if (bottomFocusAnimationFrame) {
                    return;
                }

                bottomFocusAnimationFrame = window.requestAnimationFrame(function () {
                    bottomFocusAnimationFrame = 0;

                    if (!keepBottomFocusActive) {
                        bottomFocusPendingFrames = 0;
                        return;
                    }

                    alignTerminalBottom();
                    bottomFocusPendingFrames = Math.max(0, bottomFocusPendingFrames - 1);

                    if (bottomFocusPendingFrames > 0) {
                        scheduleBottomFocus(bottomFocusPendingFrames);
                    }
                });
            }

            function setKeepBottomFocusActive(active) {
                keepBottomFocusActive = active;
                if (!active) {
                    cancelScheduledBottomFocus();
                    return;
                }
                scheduleBottomFocus(BOTTOM_FOCUS_SETTLE_FRAMES);
            }

            // キーボード表示時に、入力対象を常に末尾へ寄せる
            function focusInputAtBottom() {
                if (!terminal) {
                    return;
                }
                alignTerminalBottom();
                focusTerminal();
                scheduleBottomFocus(BOTTOM_FOCUS_SETTLE_FRAMES);
            }

            // xterm private API から cell 高さを取得する。
            // 将来的な xterm バージョン更新で壊れる可能性があるため、fallback を持つ。
            function getCellHeight() {
                if (
                    terminal &&
                    terminal._core &&
                    terminal._core._renderService &&
                    terminal._core._renderService.dimensions &&
                    terminal._core._renderService.dimensions.css &&
                    terminal._core._renderService.dimensions.css.cell &&
                    terminal._core._renderService.dimensions.css.cell.height > 0
                ) {
                    return terminal._core._renderService.dimensions.css.cell.height;
                }
                return DEFAULT_CELL_HEIGHT;
            }

            function getCellSize() {
                var width = DEFAULT_CELL_WIDTH;
                var height = DEFAULT_CELL_HEIGHT;

                if (
                    terminal &&
                    terminal._core &&
                    terminal._core._renderService &&
                    terminal._core._renderService.dimensions &&
                    terminal._core._renderService.dimensions.css &&
                    terminal._core._renderService.dimensions.css.cell
                ) {
                    var cell = terminal._core._renderService.dimensions.css.cell;
                    if (cell.width > 0) {
                        width = cell.width;
                    }
                    if (cell.height > 0) {
                        height = cell.height;
                    }
                }

                return { width: width, height: height };
            }

            function clamp(value, minValue, maxValue) {
                return Math.min(Math.max(value, minValue), maxValue);
            }

            function estimateTerminalSize() {
                var cellSize = getCellSize();
                var availableWidth = xtermRender ? xtermRender.clientWidth : window.innerWidth;
                var rawAvailableHeight = xtermRender ? xtermRender.clientHeight : window.innerHeight;
                var reservedBottomInsetPx = getReservedBottomInsetPx();
                var availableHeight = Math.max(cellSize.height, rawAvailableHeight - reservedBottomInsetPx);
                var cols = Math.floor(availableWidth / cellSize.width);
                var rows = Math.floor(availableHeight / cellSize.height);
                return {
                    cols: clamp(cols, MIN_COLS, MAX_COLS),
                    rows: clamp(rows, MIN_ROWS, MAX_ROWS),
                };
            }

            function applyViewportSize() {
                applyBottomScrollPadding();
                var size = estimateTerminalSize();
                var didResize = false;
                if (
                    terminal &&
                    typeof terminal.resize === 'function' &&
                    (terminal.cols !== size.cols || terminal.rows !== size.rows)
                ) {
                    terminal.resize(size.cols, size.rows);
                    didResize = true;
                }
                applyBottomScrollPadding();
                debugLog('applyViewportSize', {
                    cols: size.cols,
                    rows: size.rows,
                    didResize: didResize,
                    requestedBottomGapPx: requestedBottomGapPx,
                    appliedBottomScrollPaddingPx: appliedBottomScrollPaddingPx,
                    visualBottomOffsetPx: applyVisualBottomOffset(),
                    renderHeight: xtermRender ? xtermRender.clientHeight : null,
                    reservedBottomInsetPx: getReservedBottomInsetPx(),
                });
                if (keepBottomFocusActive) {
                    scheduleBottomFocus(didResize ? BOTTOM_FOCUS_SETTLE_FRAMES : 1);
                }
                return size;
            }

            function sendResizeToServer() {
                var size = applyViewportSize();
                if (!isSocketOpen()) {
                    return;
                }
                websocket.send(JSON.stringify({
                    type: 'resize',
                    cols: size.cols,
                    rows: size.rows,
                }));
            }

            // ===== 入力/出力 =====
            function sendInput(data) {
                if (!data || !isSocketOpen()) {
                    return;
                }

                websocket.send(JSON.stringify({
                    type: 'input',
                    data_b64: btoa(unescape(encodeURIComponent(data))),
                }));
            }

            function sendScroll(lines) {
                if (!isSocketOpen() || typeof lines !== 'number' || lines === 0) {
                    return false;
                }

                websocket.send(JSON.stringify({
                    type: 'scroll',
                    lines: lines,
                }));
                return true;
            }

            function routeInput(data) {
                sendInput(data);
            }

            function writeOutputChunk(text) {
                if (!ensureTerminal() || typeof terminal.write !== 'function') {
                    return false;
                }
                terminal.write(text);
                return true;
            }

            function parseOutputMessage(message) {
                if (message.type !== 'output' || !message.data_b64) {
                    return;
                }

                var bin = atob(message.data_b64);
                var bytes = new Uint8Array(bin.length);
                for (var i = 0; i < bin.length; i++) {
                    bytes[i] = bin.charCodeAt(i);
                }
                var text = new TextDecoder('utf-8').decode(bytes);
                writeOutputChunk(text);
            }

            // ===== スクロール制御 =====
            function scrollTerminalByPixels(pixelDelta) {
                if (!terminal || !isSocketOpen()) {
                    return false;
                }

                var cellHeight = Math.max(getCellHeight(), 1);
                touchScrollRemainder += pixelDelta * SCROLL_DAMPING_FACTOR;
                var lineDelta = Math.trunc(touchScrollRemainder / cellHeight);
                var sentAny = false;

                while (lineDelta !== 0) {
                    var clampedLines = clamp(lineDelta, -MAX_SCROLL_LINES, MAX_SCROLL_LINES);
                    if (!sendScroll(clampedLines)) {
                        return sentAny;
                    }
                    touchScrollRemainder -= clampedLines * cellHeight;
                    sentAny = true;
                    lineDelta = Math.trunc(touchScrollRemainder / cellHeight);
                }

                return sentAny;
            }

            function handleMouseWheelScroll(event) {
                if (!event || typeof event.deltaY !== 'number' || Math.abs(event.deltaY) < MIN_SCROLL_DELTA) {
                    return;
                }

                if (scrollTerminalByPixels(event.deltaY)) {
                    event.preventDefault();
                }
            }

            function handlePointerScrollStart(event) {
                if (!event) {
                    return;
                }
                pointerDragActive = true;
                pointerScrollLastY = event.clientY;
            }

            function handlePointerScrollMove(event) {
                if (!event || !pointerDragActive) {
                    return;
                }

                var currentY = event.clientY;
                if (pointerScrollLastY === null || typeof currentY !== 'number') {
                    pointerScrollLastY = currentY;
                    return;
                }

                var deltaY = pointerScrollLastY - currentY;
                if (Math.abs(deltaY) < MIN_SCROLL_DELTA) {
                    return;
                }

                var didScroll = scrollTerminalByPixels(deltaY);
                pointerScrollLastY = currentY;
                if (didScroll) {
                    event.preventDefault();
                }
            }

            function resetPointerScrollState() {
                pointerDragActive = false;
                pointerScrollLastY = null;
                touchScrollRemainder = 0;
            }

            function bindViewportScrollListeners() {
                if (viewportListenersBound) {
                    return;
                }

                var root = getTerminalRoot();
                if (!root) {
                    return;
                }

                root.addEventListener('wheel', handleMouseWheelScroll, { passive: false, capture: true });
                root.addEventListener('pointerdown', handlePointerScrollStart, { passive: true, capture: true });
                root.addEventListener('pointermove', handlePointerScrollMove, { passive: false, capture: true });
                root.addEventListener('pointerup', resetPointerScrollState, { passive: true, capture: true });
                root.addEventListener('pointercancel', resetPointerScrollState, { passive: true, capture: true });
                root.addEventListener('pointerleave', resetPointerScrollState, { passive: true, capture: true });

                viewportListenersBound = true;
            }

            // ===== Terminal 初期化 =====
            function configureTextareaForMobile(targetTerminal) {
                if (!targetTerminal.textarea) {
                    return;
                }

                targetTerminal.textarea.setAttribute('autocapitalize', 'off');
                targetTerminal.textarea.setAttribute('autocomplete', 'off');
                targetTerminal.textarea.setAttribute('autocorrect', 'off');
                targetTerminal.textarea.setAttribute('spellcheck', 'false');
                targetTerminal.textarea.style.caretColor = 'transparent';
                targetTerminal.textarea.style.color = 'transparent';
                targetTerminal.textarea.style.background = 'transparent';
            }

            function createTerminalInstance() {
                return new window.Terminal({
                    cols: 80,
                    rows: 24,
                    scrollback: 5000,
                    convertEol: false,
                    cursorBlink: true,
                    cursorStyle: 'block',
                    cursorInactiveStyle: 'none',
                    drawWhitespace: 'none',
                    fontFamily: 'monospace',
                    fontSize: 12,
                    lineHeight: 1.2,
                    theme: TERMINAL_THEME,
                });
            }

            function ensureTerminal() {
                if (terminal) {
                    return true;
                }
                if (typeof window.Terminal !== 'function') {
                    notifyError('xterm.js is not available');
                    return false;
                }

                try {
                    terminal = createTerminalInstance();
                    terminal.open(xtermRender);
                    bindViewportScrollListeners();
                    if (typeof terminal.onData === 'function') {
                        terminal.onData(routeInput);
                    }
                    if (typeof terminal.onRender === 'function') {
                        terminal.onRender(function () {
                            applyBottomScrollPadding();
                            if (keepBottomFocusActive) {
                                scheduleBottomFocus(1);
                            }
                        });
                    }
                    if (typeof terminal.onResize === 'function') {
                        terminal.onResize(function () {
                            applyBottomScrollPadding();
                            if (keepBottomFocusActive) {
                                scheduleBottomFocus(BOTTOM_FOCUS_SETTLE_FRAMES);
                            }
                        });
                    }
                    if (typeof terminal.onWriteParsed === 'function') {
                        terminal.onWriteParsed(function () {
                            applyBottomScrollPadding();
                            if (keepBottomFocusActive) {
                                scheduleBottomFocus(1);
                            }
                        });
                    }
                    configureTextareaForMobile(terminal);
                } catch (err) {
                    terminal = null;
                    notifyError('xterm initialization failed: ' + String(err));
                    return false;
                }

                return true;
            }

            // ===== WebSocket 接続 =====
            function closeCurrentWebSocket() {
                if (websocket) {
                    websocket.close();
                    websocket = null;
                }
            }

            function attachWebSocketHandlers(ws, wsToken) {
                ws.onopen = function () {
                    if (websocket !== ws) {
                        return;
                    }

                    ws.send(JSON.stringify({
                        type: 'auth',
                        ws_token: wsToken,
                    }));
                    notifyConnectionChanged(true);
                    sendResizeToServer();
                };

                ws.onmessage = function (event) {
                    if (websocket !== ws) {
                        return;
                    }

                    try {
                        var message = JSON.parse(event.data);
                        parseOutputMessage(message);
                    } catch (err) {
                        notifyError('Parse error: ' + String(err));
                    }
                };

                ws.onerror = function () {
                    if (websocket !== ws) {
                        return;
                    }
                    notifyError('WebSocket error');
                };

                ws.onclose = function () {
                    if (websocket !== ws) {
                        return;
                    }
                    notifyConnectionChanged(false);
                    websocket = null;
                };
            }

            function connectWebSocket(wsUrl, wsToken) {
                if (!ensureTerminal()) {
                    return;
                }

                closeCurrentWebSocket();
                var ws = new WebSocket(wsUrl);
                websocket = ws;
                attachWebSocketHandlers(ws, wsToken);
            }

            // ===== 外部公開 API =====
            window.TerminalAPI = {
                connect: function (wsUrl, wsToken) {
                    connectWebSocket(wsUrl, wsToken);
                },
                disconnect: function () {
                    closeCurrentWebSocket();
                },
                sendKey: function (key) {
                    sendInput(key);
                },
                setBottomScrollPadding: function (pixelPadding) {
                    if (typeof pixelPadding !== 'number' || !isFinite(pixelPadding)) {
                        return;
                    }
                    requestedBottomGapPx = Math.max(0, pixelPadding);
                    setKeepBottomFocusActive(requestedBottomGapPx > 0);
                    applyBottomScrollPadding();
                    var visualBottomOffsetPx = applyVisualBottomOffset();
                    debugLog('setBottomScrollPadding', {
                        requestedBottomGapPx: requestedBottomGapPx,
                        appliedBottomScrollPaddingPx: appliedBottomScrollPaddingPx,
                        visualBottomOffsetPx: visualBottomOffsetPx,
                        reservedBottomInsetPx: getReservedBottomInsetPx(),
                    });
                    sendResizeToServer();
                    if (keepBottomFocusActive) {
                        scheduleBottomFocus(BOTTOM_FOCUS_SETTLE_FRAMES);
                    }
                },
                focusInputAtBottom: function () {
                    focusInputAtBottom();
                },
                scrollByPixels: function (pixelDelta) {
                    if (typeof pixelDelta !== 'number' || Math.abs(pixelDelta) < MIN_SCROLL_DELTA) {
                        return;
                    }
                    scrollTerminalByPixels(pixelDelta);
                },
            };

            // ===== 初期化 =====
            notifyTerminalReady();

            if (ensureTerminal()) {
                applyBottomScrollPadding();
                applyViewportSize();
            }

            window.addEventListener('resize', function () {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(function () {
                    sendResizeToServer();
                }, RESIZE_DEBOUNCE_MS);
            });
        })();
    </script>
</body>
</html>
