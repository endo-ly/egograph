appId: dev.egograph.app

---
- stopApp
- waitForAnimationToEnd
- launchApp
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "chat_input_field"
    timeout: 15000

- swipe:
    start: "100,500"
    end: "700,500"
    duration: 350

- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "terminal_button"
    timeout: 10000

- tapOn:
    id: "terminal_button"

- extendedWaitUntil:
    visible:
      text: "TERMINAL SESSIONS"
    timeout: 15000

- assertVisible:
    id: "session_item"

- assertVisible:
    id: "session_preview"

- tapOn:
    id: "session_item"

- extendedWaitUntil:
    visible:
      id: "terminal_status_pill"
    timeout: 15000

- assertVisible:
    id: "terminal_back_button"

- tapOn:
    id: "terminal_copy_button"

- extendedWaitUntil:
    visible:
      text: "Copy Mode"
    timeout: 10000

- assertVisible: "Long press and drag to select terminal text"
