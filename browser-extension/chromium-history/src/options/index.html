<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EgoGraph History Sync</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e8;
        --card: #fffaf2;
        --ink: #1f1a17;
        --line: #d5c4ae;
        --accent: #1f6f5f;
        --accent-strong: #12473d;
      }
      body {
        margin: 0;
        padding: 24px;
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #fff7eb, var(--bg));
        color: var(--ink);
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 16px 40px rgba(31, 26, 23, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      form {
        display: grid;
        gap: 14px;
      }
      label {
        display: grid;
        gap: 6px;
        font-size: 14px;
      }
      input,
      select,
      button {
        font: inherit;
      }
      input,
      select {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
      }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 11px 16px;
        cursor: pointer;
        background: var(--accent);
        color: white;
      }
      button.secondary {
        background: var(--accent-strong);
      }
      #status {
        margin-top: 18px;
        min-height: 1.5em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Chromium History Sync</h1>
      <form id="settings-form">
        <label>
          Server URL
          <input id="server-url" name="serverUrl" type="url" required />
        </label>
        <label>
          X-API-Key
          <input id="x-api-key" name="xApiKey" type="password" required />
        </label>
        <label>
          Browser ID
          <select id="browser-id" name="browserId" required>
            <option value="">Select browser</option>
            <option value="edge">edge</option>
            <option value="brave">brave</option>
            <option value="chrome">chrome</option>
          </select>
        </label>
        <label>
          Device ID
          <input id="device-id" name="deviceId" type="text" required />
        </label>
        <label>
          Profile
          <input id="profile" name="profile" type="text" required />
        </label>
        <div class="actions">
          <button id="save-button" type="submit">Save</button>
          <button id="sync-button" class="secondary" type="button">Sync now</button>
        </div>
      </form>
      <p id="status" role="status" aria-live="polite" aria-atomic="true"></p>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
